<!doctype html>
<html>
  <head>
    <title>Fetch Employees</title>
  </head>
  <body>
    <script>
      // Fetch API example
      fetch("https://dummy.restapiexample.com/api/v1/employees")
        .then((response) => response.json()) // Convert response to JSON
        .then((data) => {
          console.log("Employees Data:");
          console.log(data);
        })
        .catch((error) => {
          console.error("Error fetching data:", error);
        });
    </script>
  </body>
</html>
