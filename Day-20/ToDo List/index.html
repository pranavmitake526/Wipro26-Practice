<html lang="en">
  <body>
    <h1>To Do List</h1>
    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="Enter a task" />
      <button type="submit">Add</button>
    </form>

    <ul id="todo-list"></ul>

    <h2>Counter</h2>
    <button id="decrement">-</button>
    <span id="count">0</span>
    <button id="increment">+</button>

    <script src="script.js"></script>
  </body>
</html>
